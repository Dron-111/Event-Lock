<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventLock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #171718;
    --surface2: #1e1e20;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --muted: #7a7a82;
    --accent: #c9a84c;
    --accent-dim: rgba(201,168,76,0.12);
    --accent-dim2: rgba(201,168,76,0.22);
    --locked: #3b6d11;
    --locked-bg: rgba(59,109,17,0.14);
    --locked-text: #97c459;
    --danger: #e24b4a;
    --danger-bg: rgba(226,75,74,0.12);
    --mono: 'DM Mono', monospace;
    --display: 'Fraunces', serif;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .app {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-icon svg { width: 22px; height: 22px; stroke: #0e0e0f; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .logo h1 {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .stats {
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .stats strong { color: var(--text); font-size: 20px; font-family: var(--display); font-weight: 300; display: block; letter-spacing: -0.5px; }

  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 32px;
  }

  .add-section h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-row.full { grid-template-columns: 1fr; }

  input, textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }

  input::placeholder, textarea::placeholder { color: var(--muted); }

  textarea { resize: none; height: 72px; }

  select option { background: #1e1e20; }

  .form-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
  }

  .pin-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
  }

  .pin-group svg { width: 15px; height: 15px; stroke: var(--muted); fill: none; stroke-width: 2; flex-shrink: 0; }

  .pin-group input {
    background: none;
    border: none;
    padding: 0;
    font-size: 13px;
    flex: 1;
    letter-spacing: 0.2em;
  }

  .pin-group input:focus { border: none; }

  .btn {
    padding: 10px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    color: var(--text);
    white-space: nowrap;
  }

  .btn:hover { background: var(--surface2); border-color: var(--border2); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0e0f;
    font-weight: 500;
  }

  .btn-primary:hover { background: #d4b05c; border-color: #d4b05c; }

  .btn-sm { padding: 6px 12px; font-size: 11px; }

  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: var(--danger-bg); }

  .events-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .events-header h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .filter-tabs {
    display: flex;
    gap: 4px;
  }

  .filter-tab {
    padding: 5px 12px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    border: 1px solid transparent;
    cursor: pointer;
    background: none;
    color: var(--muted);
    transition: all 0.12s;
  }

  .filter-tab.active {
    background: var(--surface2);
    border-color: var(--border2);
    color: var(--text);
  }

  .event-list { display: flex; flex-direction: column; gap: 10px; }

  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: start;
    transition: border-color 0.15s;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .event-card.locked {
    border-color: rgba(59,109,17,0.35);
    background: linear-gradient(135deg, var(--surface) 0%, rgba(59,109,17,0.06) 100%);
  }

  .event-card:hover { border-color: var(--border2); }
  .event-card.locked:hover { border-color: rgba(59,109,17,0.55); }

  .event-color-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .event-body { min-width: 0; }

  .event-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .event-title {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 5px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 500;
  }

  .badge-locked { background: var(--locked-bg); color: var(--locked-text); border: 1px solid rgba(97,196,59,0.2); }
  .badge-unlocked { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(201,168,76,0.2); }
  .badge-cat {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .event-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 14px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .event-meta span { display: flex; align-items: center; gap: 4px; }
  .event-meta svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

  .event-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  .event-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }

  .lock-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .lock-btn svg { width: 16px; height: 16px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .lock-btn.unlocked svg { stroke: var(--muted); }
  .lock-btn.locked { background: var(--locked-bg); border-color: rgba(97,196,59,0.3); }
  .lock-btn.locked svg { stroke: var(--locked-text); }

  .lock-btn:hover { border-color: var(--accent); }
  .lock-btn:hover svg { stroke: var(--accent); }

  .pin-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .pin-overlay.show { display: flex; }

  .pin-dialog {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 32px;
    width: 340px;
    animation: popIn 0.18s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }

  .pin-dialog h3 {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }

  .pin-dialog p {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 22px;
    line-height: 1.5;
  }

  .pin-dots {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .pin-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    background: transparent;
    transition: all 0.1s;
  }

  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }

  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .pin-key {
    aspect-ratio: 1.4;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    font-family: var(--mono);
    font-size: 16px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.1s;
    display: flex; align-items: center; justify-content: center;
  }

  .pin-key:hover { background: var(--surface); border-color: var(--border2); transform: scale(0.97); }
  .pin-key:active { transform: scale(0.93); }

  .pin-key.del { font-size: 11px; color: var(--muted); }

  .pin-actions { display: flex; gap: 8px; }
  .pin-actions button { flex: 1; }

  .pin-error {
    font-size: 11px;
    color: var(--danger);
    text-align: center;
    height: 16px;
    margin-top: -10px;
    margin-bottom: 10px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state svg { width: 40px; height: 40px; stroke: var(--border2); fill: none; stroke-width: 1.5; margin: 0 auto 16px; display: block; }
  .empty-state p { font-size: 13px; }

  .shake { animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .category-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1>Event<span>Lock</span></h1>
    </div>
    <div class="stats">
      <div><strong id="stat-total">0</strong>Total</div>
      <div><strong id="stat-locked">0</strong>Locked</div>
      <div><strong id="stat-upcoming">0</strong>Upcoming</div>
    </div>
  </header>

  <div class="add-section">
    <h2>+ New Event</h2>
    <div class="form-row">
      <input type="text" id="ev-title" placeholder="Event title">
      <select id="ev-cat">
        <option value="work">💼 Work</option>
        <option value="personal">🏠 Personal</option>
        <option value="health">❤️ Health</option>
        <option value="social">🎉 Social</option>
        <option value="finance">💰 Finance</option>
      </select>
    </div>
    <div class="form-row">
      <input type="date" id="ev-date">
      <input type="time" id="ev-time">
    </div>
    <div class="form-row full">
      <textarea id="ev-desc" placeholder="Description (optional)"></textarea>
    </div>
    <div class="form-actions">
      <div class="pin-group">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="ev-pin" maxlength="4" placeholder="Set lock PIN (4 digits)" inputmode="numeric" pattern="[0-9]*">
      </div>
      <button class="btn btn-primary" onclick="addEvent()">Add Event</button>
    </div>
  </div>

  <div class="events-header">
    <h2>Events</h2>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
      <button class="filter-tab" onclick="setFilter('unlocked', this)">Unlocked</button>
      <button class="filter-tab" onclick="setFilter('locked', this)">Locked</button>
    </div>
  </div>

  <div class="event-list" id="event-list"></div>

</div>

<div class="pin-overlay" id="pin-overlay" onclick="overlayClick(event)">
  <div class="pin-dialog" id="pin-dialog">
    <h3 id="pin-title">Lock Event</h3>
    <p id="pin-subtitle">Enter a 4-digit PIN to lock this event. You'll need it to unlock later.</p>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <div></div>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-actions">
      <button class="btn" onclick="closePin()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmPin()" id="pin-confirm">Confirm</button>
    </div>
  </div>
</div>

<script>
const CAT_COLORS = {
  work: '#378add', personal: '#c9a84c', health: '#e24b4a',
  social: '#7f77dd', finance: '#1d9e75'
};

let events = JSON.parse(localStorage.getItem('eventlock-events') || '[]');
let filter = 'all';
let pinState = { mode: null, eventId: null, entered: '' };

function save() { localStorage.setItem('eventlock-events', JSON.stringify(events)); }

function addEvent() {
  const title = document.getElementById('ev-title').value.trim();
  const date = document.getElementById('ev-date').value;
  const time = document.getElementById('ev-time').value;
  const desc = document.getElementById('ev-desc').value.trim();
  const cat = document.getElementById('ev-cat').value;
  const pin = document.getElementById('ev-pin').value.trim();

  if (!title) { document.getElementById('ev-title').focus(); shake(document.getElementById('ev-title')); return; }
  if (!date) { document.getElementById('ev-date').focus(); shake(document.getElementById('ev-date')); return; }

  const ev = {
    id: Date.now(),
    title, date, time, desc, cat,
    locked: false,
    pin: pin.length === 4 ? pin : null
  };

  if (pin.length === 4) ev.locked = true;

  events.unshift(ev);
  save();

  document.getElementById('ev-title').value = '';
  document.getElementById('ev-date').value = '';
  document.getElementById('ev-time').value = '';
  document.getElementById('ev-desc').value = '';
  document.getElementById('ev-pin').value = '';

  renderEvents();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderEvents();
}

function shake(el) {
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 400);
}

function deleteEvent(id) {
  const ev = events.find(e => e.id === id);
  if (ev.locked) { openPin('delete', id); return; }
  events = events.filter(e => e.id !== id);
  save(); renderEvents();
}

function toggleLock(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  if (ev.locked) { openPin('unlock', id); }
  else { openPin('lock', id); }
}

function openPin(mode, id) {
  const ev = events.find(e => e.id === id);
  pinState = { mode, eventId: id, entered: '' };
  document.getElementById('pin-error').textContent = '';
  updateDots();

  if (mode === 'lock') {
    document.getElementById('pin-title').textContent = 'Lock Event';
    document.getElementById('pin-subtitle').textContent = 'Enter a 4-digit PIN to lock "' + ev.title + '". Required to unlock or delete.';
  } else if (mode === 'unlock') {
    document.getElementById('pin-title').textContent = 'Unlock Event';
    document.getElementById('pin-subtitle').textContent = 'Enter the PIN for "' + ev.title + '" to unlock it.';
  } else if (mode === 'delete') {
    document.getElementById('pin-title').textContent = 'Delete Locked Event';
    document.getElementById('pin-subtitle').textContent = '"' + ev.title + '" is locked. Enter its PIN to delete.';
  }

  document.getElementById('pin-overlay').classList.add('show');
}

function closePin() {
  document.getElementById('pin-overlay').classList.remove('show');
  pinState = { mode: null, eventId: null, entered: '' };
}

function overlayClick(e) {
  if (e.target === document.getElementById('pin-overlay')) closePin();
}

function pinKey(k) {
  if (pinState.entered.length >= 4) return;
  pinState.entered += k;
  updateDots();
  document.getElementById('pin-error').textContent = '';
  if (pinState.entered.length === 4) setTimeout(confirmPin, 120);
}

function pinDel() {
  pinState.entered = pinState.entered.slice(0, -1);
  updateDots();
  document.getElementById('pin-error').textContent = '';
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot-' + i).classList.toggle('filled', i < pinState.entered.length);
  }
}

function confirmPin() {
  const { mode, eventId, entered } = pinState;
  if (entered.length !== 4) { document.getElementById('pin-error').textContent = 'Enter all 4 digits.'; return; }
  const ev = events.find(e => e.id === eventId);

  if (mode === 'lock') {
    ev.locked = true;
    ev.pin = entered;
    save(); renderEvents(); closePin();
  } else if (mode === 'unlock' || mode === 'delete') {
    if (ev.pin !== entered) {
      document.getElementById('pin-error').textContent = 'Incorrect PIN. Try again.';
      pinState.entered = ''; updateDots();
      shake(document.getElementById('pin-dialog'));
      return;
    }
    if (mode === 'unlock') { ev.locked = false; ev.pin = null; }
    else { events = events.filter(e => e.id !== eventId); }
    save(); renderEvents(); closePin();
  }
}

function formatDate(d, t) {
  if (!d) return '';
  const dt = new Date(d + (t ? 'T' + t : ''));
  const opts = { weekday: 'short', month: 'short', day: 'numeric' };
  let str = dt.toLocaleDateString('en-US', opts);
  if (t) str += ' · ' + dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  return str;
}

function isUpcoming(d) {
  if (!d) return false;
  return new Date(d) >= new Date(new Date().toDateString());
}

function updateStats() {
  const total = events.length;
  const locked = events.filter(e => e.locked).length;
  const upcoming = events.filter(e => isUpcoming(e.date)).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-locked').textContent = locked;
  document.getElementById('stat-upcoming').textContent = upcoming;
}

function renderEvents() {
  updateStats();
  const list = document.getElementById('event-list');
  let filtered = events;
  if (filter === 'locked') filtered = events.filter(e => e.locked);
  if (filter === 'unlocked') filtered = events.filter(e => !e.locked);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <p>${filter === 'locked' ? 'No locked events yet.' : filter === 'unlocked' ? 'No unlocked events.' : 'No events yet. Add one above!'}</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(ev => `
    <div class="event-card ${ev.locked ? 'locked' : ''}" id="card-${ev.id}">
      <div class="event-color-dot" style="background:${CAT_COLORS[ev.cat] || '#888'}"></div>
      <div class="event-body">
        <div class="event-top">
          <span class="event-title">${escHtml(ev.title)}</span>
          <span class="badge ${ev.locked ? 'badge-locked' : 'badge-unlocked'}">${ev.locked ? '🔒 locked' : '🔓 open'}</span>
          <span class="badge badge-cat">${ev.cat}</span>
        </div>
        <div class="event-meta">
          <span>
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${formatDate(ev.date, ev.time)}
          </span>
          ${isUpcoming(ev.date) ? '<span style="color: #97c459;">upcoming</span>' : '<span>past</span>'}
        </div>
        ${ev.desc ? `<div class="event-desc">${escHtml(ev.desc)}</div>` : ''}
      </div>
      <div class="event-actions">
        <button class="lock-btn ${ev.locked ? 'locked' : 'unlocked'}" onclick="toggleLock(${ev.id})" title="${ev.locked ? 'Unlock' : 'Lock'}">
          ${ev.locked
            ? `<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`
            : `<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>`
          }
        </button>
        <button class="btn btn-sm btn-danger" onclick="deleteEvent(${ev.id})">del</button>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('ev-date').valueAsDate = new Date();

renderEvents();
</script>
</body>
</html>
